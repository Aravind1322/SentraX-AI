[loggers]
keys=root,backend,alerts,audit,errors

[handlers]
keys=consoleHandler,backendHandler,alertsHandler,auditHandler,errorsHandler

[formatters]
keys=standardFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_backend]
level=INFO
handlers=consoleHandler,backendHandler
qualname=backend
propagate=0

[logger_alerts]
level=INFO
handlers=consoleHandler,alertsHandler
qualname=alerts
propagate=0

[logger_audit]
level=INFO
handlers=auditHandler
qualname=audit
propagate=0

[logger_errors]
level=WARNING
handlers=consoleHandler,errorsHandler
qualname=errors
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=standardFormatter
args=(sys.stdout,)

[handler_backendHandler]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=standardFormatter
args=('logs/backend.log', 'a', 10485760, 5, 'utf-8')

[handler_alertsHandler]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=standardFormatter
args=('logs/alerts.log', 'a', 5242880, 5, 'utf-8')

[handler_auditHandler]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=standardFormatter
args=('logs/audit.log', 'a', 10485760, 10, 'utf-8')

[handler_errorsHandler]
class=logging.handlers.RotatingFileHandler
level=WARNING
formatter=standardFormatter
args=('logs/errors.log', 'a', 5242880, 5, 'utf-8')

[formatter_standardFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
